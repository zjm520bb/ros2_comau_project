controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    internal_passive_controller:
      type: position_controllers/JointGroupPositionController

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

    constraints:
      stopped_velocity_tolerance: 0.001745
      goal_time: 3.0
      joint_1: {trajectory: 0.1, goal: 0.003491}
      joint_2: {trajectory: 0.1, goal: 0.003491}
      joint_3: {trajectory: 0.1, goal: 0.003491}
      joint_4: {trajectory: 0.1, goal: 0.003491}
      joint_5: {trajectory: 0.1, goal: 0.003491}
      joint_6: {trajectory: 0.1, goal: 0.003491}

    gains:
      joint_1: {p: 150.0, i: 1.0, d: 2.0}
      joint_2: {p: 150.0, i: 1.0, d: 2.0}
      joint_3: {p: 150.0, i: 1.0, d: 2.0}
      joint_4: {p: 150.0, i: 1.0, d: 2.0}
      joint_5: {p: 150.0, i: 1.0, d: 2.0}
      joint_6: {p: 150.0, i: 1.0, d: 2.0}

internal_passive_controller:
  ros__parameters:
    joints:
      - joint_7
      - joint_8
