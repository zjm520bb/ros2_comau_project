planning_plugin: ompl_interface/OMPLPlanner
start_state_max_bounds_error: 0.1
jiggle_fraction: 0.05
# joint_4 and joint_6 are multi-turn joints, so a state-space fraction alone
# produces collision-checking segments that are much too long. Cap every OMPL
# edge validation step explicitly to avoid skipping over collision regions.
maximum_waypoint_distance: 0.02
request_adapters: >-
  default_planner_request_adapters/AddTimeOptimalParameterization
  default_planner_request_adapters/ResolveConstraintFrames
  default_planner_request_adapters/FixWorkspaceBounds
  default_planner_request_adapters/FixStartStateBounds
  default_planner_request_adapters/FixStartStateCollision
  default_planner_request_adapters/FixStartStatePathConstraints

planner_configs:
  RRTConnectkConfigDefault:
    type: geometric::RRTConnect
    # The automatic range is derived from the full state-space extent, which
    # is dominated by the multi-turn wrist joints. Keep tree expansion local
    # so collision states cannot be jumped over by one oversized extension.
    range: 0.05
    # Keep the normal path simplifier, but do not hybridize parallel attempts:
    # hybridization may create additional cross-path shortcuts.
    simplify_solutions: 1
    hybridize: 0
    interpolate: 1

arm:
  default_planner_config: RRTConnectkConfigDefault
  planner_configs:
    - RRTConnectkConfigDefault
  # The arm state-space extent is dominated by the multi-turn wrist joints.
  # 0.005 was too coarse and allowed a shortcut to skip through a thin
  # collision region before MoveIt's final trajectory validation caught it.
  longest_valid_segment_fraction: 0.0001
