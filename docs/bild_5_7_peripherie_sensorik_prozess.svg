<svg xmlns="http://www.w3.org/2000/svg" width="160mm" height="220mm" viewBox="0 0 1600 2200">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000"/>
    </marker>
    <style>
      text { font-family: Arial, Liberation Sans, sans-serif; fill: #000; text-anchor: middle; }
      .title { font-size: 41px; font-weight: 700; }
      .head { font-size: 39px; font-weight: 700; }
      .body { font-size: 39px; font-weight: 400; }
      .box { fill: #f8f8f8; stroke: #000; stroke-width: 3; }
      .white { fill: #fff; stroke: #000; stroke-width: 3; }
      .dash { fill: #fff; stroke: #000; stroke-width: 3; stroke-dasharray: 16 10; }
      .line { stroke: #000; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="25" y="25" width="1550" height="2165" rx="8" class="white"/>
